plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true
include:
  - README.md
  - LICENSE.md
url: https://thingking-machine.github.io
baseurl: /basta

title: Thingking Machine
description: A machine is a thing. Things can not think. ...but some of them can thingk!

machine:
  name: Thingking-Machine
  verb: Thingking
  instructions_file: thingking.md
  token: basta
  server: https://localhost:443
  apiUrl: https://inference.baseten.co/v1/chat/completions

app:
  worker_name: bastapi.js

lm:
  model: moonshotai/Kimi-K2.6
  max_tokens: 65536

github_settings:
  owner: thingking-machine
  repo: thingking_machine
  file_name: machina.yaml
  branch: main
  token_file: github.txt
